name: Bug report
description: Report a problem with Company Brain
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: false
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running it?
      options:
        - docker-compose (default)
        - docker-compose + TLS overlay
        - local / dev
        - other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs here. Do NOT include API keys or secrets.
      render: shell
